# CA Persistent Volume Override — Full CA Home
# Mounts the ENTIRE CA home directory as a named Docker volume so all state
# (ca-cert.pem, ca-key.pem, fabric-ca-server.db, msp/) survives restarts.
#
# Volumes are declared external so `docker compose down --volumes` never removes them.
# Create them once with: ./setup-volumes.sh (called automatically by start.sh)

networks:
  test:
    name: fabric_test

volumes:
  fabric_ca_org1:
    external: true
  fabric_ca_org2:
    external: true
  fabric_ca_orderer:
    external: true

services:
  ca_org1:
    volumes:
      - fabric_ca_org1:/etc/hyperledger/fabric-ca-server

  ca_org2:
    volumes:
      - fabric_ca_org2:/etc/hyperledger/fabric-ca-server

  ca_orderer:
    volumes:
      - fabric_ca_orderer:/etc/hyperledger/fabric-ca-server
